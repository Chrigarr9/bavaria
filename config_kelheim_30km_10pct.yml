## Synthetic population pipeline for Kelheim 30km radius - 10% Sample
## For calibration: fast iteration with standalone DMC
## 9 Landkreise within 30km of Kelheim center (~132k agents at 10%)

working_directory: C:/matsim_cache_v7

run:
  - synthesis.output
  - matsim.output

config:
  processes: 8
  hts: entd
  sampling_rate: 0.10
  random_seed: 1234

  data_path: C:/Users/VWAUCCY/dev/msf/projects/Dissertation/matsim_scenarios/bavaria/data
  output_path: C:/Users/VWAUCCY/dev/msf/projects/Dissertation/matsim_scenarios/bavaria/output/kelheim_30km_10pct_v7
  output_prefix: kelheim_30km_10pct_

  bavaria.population_path: bavaria/a1310c_202200.xlsx
  bavaria.work_flow_path: bavaria/a6502c_202200.xlsx
  bavaria.licenses_path: germany/fe4_2025.xlsx

  java_binary: C:/Users/VWAUCCY/dev/msf/.jdk/jdk-22.0.2+9/bin/java.exe
  java_memory: 20G
  osmosis_binary: C:/Users/VWAUCCY/dev/msf/projects/Dissertation/matsim_scenarios/bavaria/tools/osmosis/bin/osmosis.bat
  osmconvert_binary: C:/Users/VWAUCCY/dev/msf/projects/Dissertation/matsim_scenarios/bavaria/tools/osmconvert.exe
  osmium_binary: C:/Users/VWAUCCY/AppData/Roaming/mamba/envs/bavaria/Library/bin/osmium.exe

  home_location_sampling: weighted
  mode_choice: false
  matching_attributes: ["sex", "age_class", "has_license"]

  # Distance scaling: ENTD → MiD 2017 Bayern ratios
  commute_distance_scale_work: 1.2
  commute_distance_scale_education: 1.4
  secondary_distance_scale: 1.0

  # Purpose-specific secondary distance correction factors
  # Calibrated via grid search simulation against ENTD euclidean distributions
  # Pipeline uses ENTD routed/1.3 as euclidean targets (see entd/reweighted.py)
  shop_correction_factor: 0.8
  leisure_correction_factor: 1.3
  other_correction_factor: 1.1

  # Distance-aware discretization: query K nearest facilities, pick best distance match
  secloc_k_candidates: 5

  # Gravity model parameters for work/education OD distribution
  # Defaults (from Île-de-France): slope=-0.2, constant=-2.4, diagonal=1.0
  # IDF defaults over-localize for rural Bavaria (88% same-Gemeinde)
  # Reduced diagonal and flatter slope to allow realistic commute distances
  # diagonal=0: no same-Gemeinde bonus, distance is the sole criterion
  gravity_slope: -0.1
  gravity_constant: -2.4
  gravity_diagonal: 0.0
  # BA Pendlerverflechtungen for Kreis-level commuter flow constraints (null = pure gravity)
  pendler_od_path: germany/krpend-k-0-202306-xlsx.xlsx
  # Gemeinde-level Pendlerrechnung OD data (overrides Kreis-level when set)
  gemeinde_od_path: bavaria/2024_Verfl_L09.csv
  gemeinde_iop_path: bavaria/2024_IOP_Karte_L00.csv

  gtfs_path: gtfs
  osm_path: osm
  osm_highways: motorway,trunk,primary,secondary,tertiary,unclassified,residential,motorway_link,trunk_link,primary_link,secondary_link,tertiary_link,living_street,service,pedestrian,cycleway,footway,steps,track,path

  # 9 Landkreise within 30km border distance of Kelheim center (~1.32M pop → ~132k at 10%)
  bavaria.political_prefix:
    - "09273"  # Kelheim (LK) — core area (~127k) — 0km
    - "09375"  # Regensburg (LK) (~200k) — 6km
    - "09176"  # Eichstätt (LK) (~137k) — 9km
    - "09362"  # Regensburg (kreisfreie Stadt) (~159k) — 16km
    - "09373"  # Neumarkt i.d.OPf (LK) (~139k) — 17km
    - "09186"  # Pfaffenhofen a.d.Ilm (LK) (~133k) — 18km
    - "09274"  # Landshut (LK) (~166k) — 22km
    - "09278"  # Straubing-Bogen (LK) (~104k) — 26km
    - "09376"  # Schwandorf (LK) (~152k) — 28km

aliases:
  data.census.filtered: bavaria.ipf.attributed
  synthesis.population.income.selected: bavaria.income
  synthesis.population.spatial.home.zones: bavaria.homes
  synthesis.locations.home.locations: bavaria.locations.home
  synthesis.locations.education: bavaria.locations.education
  synthesis.locations.secondary: bavaria.locations.secondary
  synthesis.locations.work: bavaria.locations.work
  data.od.weighted: bavaria.gravity.model
  data.spatial.iris: bavaria.data.spatial.iris
  data.spatial.codes: bavaria.entd_codes
  synthesis.population.spatial.primary.locations: bavaria.locations.synthesis.replacement
  synthesis.population.enriched: bavaria.synthesis.population.enriched
  matsim.simulation.prepare: bavaria.matsim.simulation.prepare
